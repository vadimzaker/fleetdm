kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # nginx ingress HTTP → http://fleet.local
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # nginx ingress HTTPS → https://fleet.local
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Fleet NodePort → http://localhost:8080 (fleetd agents)
      - containerPort: 32080
        hostPort: 8080
        protocol: TCP
