{{- if .Values.tls.enabled }}
---
# Root self-signed issuer — used only to bootstrap the CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-root
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# Local CA certificate issued by the root self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fleet-local-ca
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: fleet-local-ca
  secretName: fleet-local-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-root
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed issuer — signs the actual fleet.local TLS certificate
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: fleet-ca-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
spec:
  ca:
    secretName: fleet-local-ca-secret
{{- end }}
