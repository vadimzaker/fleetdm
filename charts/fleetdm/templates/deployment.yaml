apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleetdm.fullname" . }}
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  replicas: {{ .Values.fleet.replicaCount }}
  selector:
    matchLabels:
      {{- include "fleetdm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fleetdm.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "fleetdm.mysqlHost" . }} 3306; do
                echo "Waiting for MySQL..."; sleep 3
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "fleetdm.redisHost" . }} 6379; do
                echo "Waiting for Redis..."; sleep 3
              done
      containers:
        - name: fleet
          image: "{{ .Values.fleet.image.repository }}:{{ .Values.fleet.image.tag }}"
          imagePullPolicy: {{ .Values.fleet.image.pullPolicy }}
          command: ["fleet", "serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "fleetdm.fullname" . }}
          env:
            {{- range $key, $val := .Values.fleet.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.fleet.resources | nindent 12 }}
