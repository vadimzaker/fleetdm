apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fleetdm.fullname" . }}-prepare-db
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fleetdm.name" . }}-prepare-db
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "fleetdm.mysqlHost" . }} 3306; do
                echo "Waiting for MySQL..."; sleep 3
              done
      containers:
        - name: fleet-prepare-db
          image: "{{ .Values.fleet.image.repository }}:{{ .Values.fleet.image.tag }}"
          imagePullPolicy: {{ .Values.fleet.image.pullPolicy }}
          command: ["fleet", "prepare", "db"]
          envFrom:
            - secretRef:
                name: {{ include "fleetdm.fullname" . }}
          env:
            {{- range $key, $val := .Values.fleet.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
