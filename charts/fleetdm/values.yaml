# TLS — certificate is auto-generated by cert-manager using a self-signed CA.
tls:
  enabled: true
  secretName: fleet-local-tls

# FleetDM server configuration
fleet:
  replicaCount: 1

  image:
    repository: fleetdm/fleet
    tag: "v4.62.0"
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    port: 8080
    nodePort: 32080

  ingress:
    enabled: true
    className: "nginx"
    host: "fleet.local"
    tls: []

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  env:
    FLEET_SERVER_ADDRESS: "0.0.0.0:8080"
    FLEET_SERVER_TLS: "false"
    FLEET_LOGGING_JSON: "true"

  secrets:
    jwtKey: "sdljhewk-jwt-secsde-32chars-wsd)"


mysql:
  image:
    tag: "8.4"
  auth:
    database: fleet
    username: fleet
    password: fleetpassword
    rootPassword: rootpassword
  persistence:
    size: 8Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi


redis:
  image:
    tag: "7.4"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
